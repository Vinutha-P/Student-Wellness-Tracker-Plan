openapi: 3.0.3
info:
  title: Student Wellness Auth Service
  version: 1.0.0
servers:
  - url: http://localhost:4001
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service healthy
  /auth/signup:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role:
                  type: string
                  enum: [student, counselor, admin]
      responses:
        "201":
          description: User created
        "409":
          description: Duplicate email
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Auth success
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      summary: Validate token and return user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
        "401":
          description: Invalid or missing token
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
